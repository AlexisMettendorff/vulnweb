name: Pipeline DevSecOps PHP

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  # 🔍 Analyse statique (SAST)
  sast:
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: php
          build-mode: none

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  # 📦 Analyse des dépendances (SCA)
  dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Install dependencies (si composer présent)
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist
          fi

      - name: Audit dependencies
        run: |
          if [ -f composer.json ]; then
            composer audit
          else
            echo "Pas de composer.json → skip audit"
          fi

  # 🛡️ Scan des secrets
  secrets-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan secrets avec Gitleaks
        uses: gitleaks/gitleaks-action@v2

  # 🧪 Vérification basique PHP (lint)
  php-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Lint PHP files
        run: |
          find . -type f -name "*.php" -exec php -l {} \;

  # 🌐 DAST (scan dynamique simple)
  dast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start PHP server
        run: |
          php -S localhost:8000 -t src &
          sleep 5

      - name: Run OWASP ZAP scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: "http://localhost:8000"